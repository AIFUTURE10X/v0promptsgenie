name: Build Desktop App

on:
  workflow_dispatch:
  push:
    paths:
      - 'desktop/**'
      - '.github/workflows/build-desktop.yml'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Tauri CLI
        run: npm install --global @tauri-apps/cli@^2

      - name: Create placeholder frontend dist
        shell: bash
        run: |
          mkdir -p desktop/dist
          echo '<!doctype html><title>V0 Prompts Genie</title><body>Loading…</body>' > desktop/dist/index.html

      - name: Generate icons
        shell: bash
        run: cd desktop && tauri icon src-tauri/icons/icon.png

      - name: Build
        shell: bash
        run: cd desktop && tauri build --bundles nsis

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: v0-prompts-genie-desktop-windows
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
